<head>

  <title>The 404 Society – Student Developer Community in Shivamogga | PESITM</title>
  <meta name="description"
    content="The 404 Society is a student-run coding club at PESITM Shivamogga. Join our AI workshops, hackathons, full-stack development sessions, and peer-to-peer learning community." />
  <meta name="keywords"
    content="coding club, student developer community, PESITM Shivamogga, AI workshops, hackathons, web development, machine learning, Karnataka" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap');

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Manrope', sans-serif;
      background-color: #000000;
      color: #ffffff;
    }

    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }

    /* Glitch Effect Keyframes */
    @keyframes glitch-anim-1 {
      0% {
        clip-path: inset(20% 0 80% 0);
        transform: translate(-2px, 1px);
      }

      20% {
        clip-path: inset(60% 0 10% 0);
        transform: translate(2px, -1px);
      }

      40% {
        clip-path: inset(40% 0 50% 0);
        transform: translate(-2px, 2px);
      }

      60% {
        clip-path: inset(80% 0 5% 0);
        transform: translate(2px, -2px);
      }

      80% {
        clip-path: inset(10% 0 70% 0);
        transform: translate(-1px, 1px);
      }

      100% {
        clip-path: inset(30% 0 50% 0);
        transform: translate(1px, -1px);
      }
    }

    @keyframes glitch-anim-2 {
      0% {
        clip-path: inset(10% 0 60% 0);
        transform: translate(2px, -1px);
      }

      20% {
        clip-path: inset(80% 0 5% 0);
        transform: translate(-2px, 2px);
      }

      40% {
        clip-path: inset(30% 0 20% 0);
        transform: translate(2px, 1px);
      }

      60% {
        clip-path: inset(10% 0 80% 0);
        transform: translate(-1px, -2px);
      }

      80% {
        clip-path: inset(50% 0 30% 0);
        transform: translate(1px, 2px);
      }

      100% {
        clip-path: inset(20% 0 70% 0);
        transform: translate(-2px, 1px);
      }
    }

    .glitch-wrapper {
      position: relative;
      display: inline-block;
    }

    .glitch-wrapper::before,
    .glitch-wrapper::after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: inherit;
    }

    .glitch-wrapper::before {
      left: 2px;
      text-shadow: -1px 0 #ffffff;
      clip-path: inset(0 0 0 0);
      animation: glitch-anim-1 2s infinite linear alternate-reverse;
      opacity: 0.7;
    }

    .glitch-wrapper::after {
      left: -2px;
      text-shadow: -1px 0 #999999;
      clip-path: inset(0 0 0 0);
      animation: glitch-anim-2 3s infinite linear alternate-reverse;
      opacity: 0.7;
    }

    /* Hide scrollbar for Chrome, Safari and Opera */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    /* Hide scrollbar for IE, Edge and Firefox */
    .no-scrollbar {
      -ms-overflow-style: none;
      /* IE and Edge */
      scrollbar-width: none;
      /* Firefox */
    }
  </style>

  }
}
</script>
